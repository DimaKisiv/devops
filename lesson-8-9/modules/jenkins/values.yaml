controller:
  admin:
    username: ${admin_username}
    password: ${admin_password}

  serviceType: LoadBalancer
  servicePort: 80
  targetPort: 8080

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - credentials-binding:latest
    - github:latest

  JCasC:
    defaultConfig: true

serviceAccount:
  create: true
  name: ${service_account_name}
  annotations:
    eks.amazonaws.com/role-arn: ${irsa_role_arn}

rbac:
  create: true
  readSecrets: true

agent:
  enabled: true

persistence:
  enabled: true
  storageClass: gp2
  size: 10Gi
