replicaCount: 2

image:
  repository: 123456789012.dkr.ecr.eu-north-1.amazonaws.com/lesson-7-ecr
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8000

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

config:
  DJANGO_SETTINGS_MODULE: config.settings
  DEBUG: "False"
  SECRET_KEY: replace-me
  ALLOWED_HOSTS: "*"
  DATABASE_URL: postgres://user:password@db:5432/app

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
